name: Tesla Data Collector

on:
  schedule:
    - cron: '*/30 * * * *'   # 30분마다 실행
  workflow_dispatch:          # 수동 실행 버튼도 활성화

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests supabase

      - name: Run collector
        env:
          TESLA_CLIENT_ID:     ${{ secrets.TESLA_CLIENT_ID }}
          TESLA_CLIENT_SECRET: ${{ secrets.TESLA_CLIENT_SECRET }}
          TESLA_REFRESH_TOKEN: ${{ secrets.TESLA_REFRESH_TOKEN }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
        run: python collect.py
